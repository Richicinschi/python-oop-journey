# Render deployment configuration
# This file configures the services for deployment on Render

services:
  # Backend API service
  - type: web
    name: oop-journey-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://python-oop-journey.onrender.com,http://localhost:3000
      - key: DATABASE_URL
        fromDatabase:
          name: oop-journey-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SANDBOX_IMAGE
        value: oop-journey-sandbox:latest
    healthCheckPath: /health
    # Increased start period to allow for migrations on first deploy
    healthCheckTimeout: 30
    healthCheckInterval: 30

  # Frontend web service
  - type: web
    name: python-oop-journey
    runtime: node
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://oop-journey-api.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://python-oop-journey.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: oop-journey-db
    databaseName: oop_journey
    user: oop_journey
