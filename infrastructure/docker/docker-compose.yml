# =============================================================================
# Docker Compose - Development Configuration
# =============================================================================
# Usage: docker compose -f infrastructure/docker/docker-compose.yml up -d
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # Frontend (Next.js)
  # ===========================================================================
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web.Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - ../../apps/web:/app/apps/web:delegated
      - ../../packages:/app/packages:delegated
      # Anonymous volumes for node_modules (don't overwrite with host)
      - /app/apps/web/node_modules
      - /app/packages/ui/node_modules
      - /app/node_modules
      # Next.js build cache
      - next_cache:/app/apps/web/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - API_INTERNAL_URL=http://api:8000
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Backend API (FastAPI)
  # ===========================================================================
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
      target: development
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reload
      - ../../apps/api:/app/apps/api:delegated
      - ../../packages:/app/packages:delegated
      # Anonymous volume for pycache
      - /app/apps/api/__pycache__
      - /app/apps/api/.venv
      # Mount curriculum for content ingestion
      - ../../python-oop-journey-v2:/app/curriculum:ro
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/oopjourney}
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=20
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Curriculum
      - CURRICULUM_PATH=/app/curriculum
      # Auth (development defaults)
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      # Environment
      - ENVIRONMENT=development
      - DEBUG=true
      # Sandbox
      - SANDBOX_DOCKER_IMAGE=oopjourney-sandbox:latest
      - SANDBOX_TIMEOUT_SECONDS=30
      - SANDBOX_MEMORY_LIMIT_MB=256
      - SANDBOX_CPU_LIMIT=0.5
    env_file:
      - ../../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-oopjourney}
      - PGDATA=/var/lib/postgresql/data/pgdata
    env_file:
      - ../../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Redis Cache & Queue
  # ===========================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Python Execution Sandbox
  # ===========================================================================
  sandbox:
    build:
      context: ../..
      dockerfile: infrastructure/docker/sandbox.Dockerfile
    # This service doesn't run continuously - API spawns containers dynamically
    image: oopjourney-sandbox:latest
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m,uid=1000,gid=1000
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 50
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    network_mode: none
    user: "1000:1000"
    logging:
      driver: "local"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      replicas: 0  # Managed dynamically by API

# =============================================================================
# Networks
# =============================================================================
networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
  backend:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.2.0/24

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  next_cache:
    driver: local
