# =============================================================================
# Docker Compose - Production Configuration
# =============================================================================
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# WARNING: This configuration is for production use only.
# - No volume mounts (immutable containers)
# - Automatic restart policies
# - Resource limits enforced
# - External networks for traefik/proxy integration
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # Frontend (Next.js)
  # ===========================================================================
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web.Dockerfile
      target: production
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - API_INTERNAL_URL=http://api:8000
    env_file:
      - ../../.env.production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service_name,environment"

  # ===========================================================================
  # Backend API (FastAPI)
  # ===========================================================================
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      # Database
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_POOL_SIZE=20
      - DATABASE_MAX_OVERFLOW=40
      # Redis
      - REDIS_URL=${REDIS_URL}
      # Curriculum
      - CURRICULUM_PATH=/app/curriculum
      # Auth
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      # Environment
      - ENVIRONMENT=production
      - DEBUG=false
      # Sandbox
      - SANDBOX_DOCKER_IMAGE=oopjourney-sandbox:latest
      - SANDBOX_TIMEOUT_SECONDS=30
      - SANDBOX_MEMORY_LIMIT_MB=256
      - SANDBOX_CPU_LIMIT=0.5
    env_file:
      - ../../.env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - traefik-public  # External network for reverse proxy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service_name,environment"

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    env_file:
      - ../../.env.production
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===========================================================================
  # Redis Cache & Queue
  # ===========================================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_prod_data:/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===========================================================================
  # Celery Worker (Background Jobs)
  # ===========================================================================
  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    command: celery -A apps.api.celery_app worker --loglevel=info --concurrency=4
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CURRICULUM_PATH=/app/curriculum
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    env_file:
      - ../../.env.production
    depends_on:
      - db
      - redis
    networks:
      - backend
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===========================================================================
  # Celery Beat (Scheduled Tasks)
  # ===========================================================================
  beat:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    command: celery -A apps.api.celery_app beat --loglevel=info
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    env_file:
      - ../../.env.production
    depends_on:
      - db
      - redis
    networks:
      - backend
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===========================================================================
  # Sandbox Service (Template for dynamic containers)
  # ===========================================================================
  sandbox:
    build:
      context: ../..
      dockerfile: infrastructure/docker/sandbox.Dockerfile
    image: oopjourney-sandbox:latest
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m,uid=1000,gid=1000
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 50
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    network_mode: none
    user: "1000:1000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 0  # Managed dynamically by API

# =============================================================================
# Networks
# =============================================================================
networks:
  frontend:
    driver: bridge
    internal: true  # Internal only, accessed via reverse proxy
  backend:
    driver: bridge
    internal: true
  traefik-public:
    external: true  # Created by reverse proxy setup

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
